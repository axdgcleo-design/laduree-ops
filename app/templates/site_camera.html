{% extends 'base.html' %}
{% block title %}拍照 — 工地照片{% endblock %}
{% block head %}
<style>
  .cam-video { width:100%; max-width:380px; aspect-ratio:3/4; border-radius:12px;
    background:#111; object-fit:cover; border:1px solid var(--line); }
  .cam-count { font-size:.78rem; color:var(--green); min-height:1.2em; }
  .cam-flash { position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none;
    z-index:150; transition:opacity .08s; }
  .cam-flash.on { opacity:.85; transition:none; }
  .cam-fallback { display:none; flex-direction:column; align-items:center; gap:.6rem; }
</style>
{% endblock %}
{% block body %}
<div class="page sp-page">

  <div class="sp-topbar">
    <select class="sp-proj" id="cam-proj" onchange="goProj(this.value)">
      <option value="">全部案場</option>
      {% for p in projects %}
      <option value="{{ p.id }}" {% if selected_project == p.id|string %}selected{% endif %}>{{ p.name }}</option>
      {% endfor %}
    </select>
    <label class="cam-toggle" style="margin-left:auto">
      <span>待處理</span>
      <span class="switch">
        <input type="checkbox" id="pend-toggle" checked>
        <span class="track"></span><span class="knob"></span>
      </span>
    </label>
  </div>

  <div class="cam-stage">
    <!-- 即時相機 -->
    <video class="cam-video" id="cam-video" playsinline autoplay muted style="display:none"></video>

    <!-- 啟動中 / 提示 -->
    <div class="cam-placeholder" id="cam-ph">
      正在啟動相機…<br>
      <span style="font-size:.78rem;opacity:.7">「待處理」開著 → 連續拍、不分類，直接進待處理</span>
    </div>

    <!-- 相機無法使用時的備援：叫原生相機 -->
    <div class="cam-fallback" id="cam-fallback">
      <div class="cam-placeholder" style="max-width:380px">
        無法開啟即時相機<br>
        <span style="font-size:.78rem;opacity:.7">改用手機相機，一次一張</span>
      </div>
      <input type="file" id="cam-file" accept="image/*" capture="environment" style="display:none" onchange="onFilePick(event)">
      <button class="btn btn-primary" onclick="document.getElementById('cam-file').click()">開啟相機拍一張</button>
    </div>

    <div class="cam-count" id="cam-count"></div>
    <button class="cam-shutter" id="shutter" onclick="capture()" disabled></button>
    <div style="font-size:.75rem;color:var(--muted)" id="cam-hint">連續按快門即可連拍 · 自動壓縮上傳</div>
  </div>
</div>
<canvas id="cam-canvas" style="display:none"></canvas>
<div class="cam-flash" id="flash"></div>

{% set active='camera' %}
{% include '_site_tabs.html' %}

<!-- 拍完立即分類 sheet（待處理關閉時使用） -->
<div class="sheet-overlay" id="sheet-ov" onclick="cancelClassify()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-grab"></div>
  <img class="sheet-img" id="c-img" src="">
  <div class="form-group" style="margin-bottom:.7rem">
    <label>這張是？</label>
    <div class="seg" id="c-status">
      <button type="button" data-v="done"    class="on-done" onclick="cSetStatus('done')">✅ 一般紀錄</button>
      <button type="button" data-v="fix"     onclick="cSetStatus('fix')">🔴 待修改</button>
      <button type="button" data-v="discuss" onclick="cSetStatus('discuss')">💬 待討論</button>
    </div>
  </div>
  <div class="form-grid">
    <div class="form-group"><label>空間位置</label><input type="text" id="c-area" placeholder="例：客廳"></div>
    <div class="form-group"><label>工種分類</label><input type="text" id="c-tag" list="tag-list" placeholder="例：泥作"></div>
    <div class="form-group form-full"><label>備註</label><textarea id="c-note" style="min-height:56px"></textarea></div>
  </div>
  <datalist id="tag-list">
    <option value="保護/拆除"><option value="水電"><option value="泥作"><option value="木作">
    <option value="油漆"><option value="磁磚"><option value="防水"><option value="輕隔間">
    <option value="鋁窗"><option value="清潔">
  </datalist>
  <div class="modal-actions" style="margin-top:1rem">
    <button class="btn btn-outline" onclick="cancelClassify()">取消</button>
    <button class="btn btn-primary" id="c-save" onclick="saveClassify()">儲存</button>
  </div>
</div>

<div class="toast" id="toast"></div>
{% endblock %}

{% block scripts %}
<script>
function goProj(v){ location = '{{ url_for("site_camera") }}' + (v ? ('?project_id='+v) : ''); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1500); }
function projId(){ return document.getElementById('cam-proj').value || null; }

const video  = document.getElementById('cam-video');
const canvas = document.getElementById('cam-canvas');
let stream = null, savedCount = 0, cStatus = 'done', shotUrl = '';

/* ── 啟動即時相機 ── */
async function startCamera(){
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){ showFallback(); return; }
  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ ideal:'environment' } }, audio:false });
    video.srcObject = stream;
    await video.play().catch(()=>{});
    document.getElementById('cam-ph').style.display='none';
    video.style.display='';
    document.getElementById('shutter').disabled = false;
  }catch(e){ showFallback(); }
}
function showFallback(){
  document.getElementById('cam-ph').style.display='none';
  video.style.display='none';
  document.getElementById('cam-fallback').style.display='flex';
  document.getElementById('shutter').style.display='none';
  document.getElementById('cam-hint').textContent='此瀏覽器不支援即時連拍，改用單張相機';
}
function flash(){ const f=document.getElementById('flash'); f.classList.add('on');
  setTimeout(()=>f.classList.remove('on'),90); }

/* ── 從影像串流擷取一格 ── */
function grabFrame(){
  const max=1280;
  let w=video.videoWidth, h=video.videoHeight;
  if(!w||!h) return null;
  if(w>max||h>max){ const r=Math.min(max/w,max/h); w=Math.round(w*r); h=Math.round(h*r); }
  canvas.width=w; canvas.height=h;
  canvas.getContext('2d').drawImage(video,0,0,w,h);
  return canvas.toDataURL('image/jpeg',0.7);
}

/* ── 按快門 ── */
function capture(){
  const url = grabFrame();
  if(!url){ toast('相機尚未就緒'); return; }
  flash();
  if(document.getElementById('pend-toggle').checked){
    // 連拍：立即擷取、背景上傳、快門馬上可再按
    uploadBg(url);
  } else {
    // 立即分類：定格這張，開 sheet
    shotUrl = url; openClassify();
  }
}

/* 背景上傳（連拍不卡） */
async function uploadBg(url){
  try{
    const ok = await postPhoto({ image_data:url, status:'unclassified' });
    if(ok){ savedCount++; document.getElementById('cam-count').textContent = '📸 本次已存 '+savedCount+' 張（待處理）'; }
    else toast('上傳失敗');
  }catch(e){ toast('上傳失敗'); }
}

async function postPhoto(extra){
  const body = Object.assign({ mime:'image/jpeg', project_id:projId() }, extra);
  const r = await fetch('/api/site-photo', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  return (await r.json()).ok;
}

/* ── 立即分類 sheet（toggle 關） ── */
function openClassify(){
  cStatus='done'; cSetStatus('done');
  document.getElementById('c-img').src=shotUrl;
  document.getElementById('c-area').value='';
  document.getElementById('c-tag').value='';
  document.getElementById('c-note').value='';
  document.getElementById('sheet-ov').classList.add('open');
  document.getElementById('sheet').classList.add('open');
}
function closeSheet(){
  document.getElementById('sheet-ov').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}
function cancelClassify(){ closeSheet(); }
function cSetStatus(v){ cStatus=v; document.querySelectorAll('#c-status button').forEach(b=>{ b.className=(b.dataset.v===v)?('on-'+v):''; }); }
async function saveClassify(){
  const btn=document.getElementById('c-save'); btn.disabled=true; btn.textContent='儲存中…';
  const ok = await postPhoto({ image_data:shotUrl, status:cStatus,
    area:document.getElementById('c-area').value.trim(),
    tag:document.getElementById('c-tag').value.trim(),
    note:document.getElementById('c-note').value.trim() });
  btn.disabled=false; btn.textContent='儲存';
  if(ok){ closeSheet(); savedCount++; document.getElementById('cam-count').textContent='📸 本次已存 '+savedCount+' 張'; toast('已儲存 ✅'); }
  else toast('儲存失敗，請重試');
}

/* ── 備援：原生相機單張 ── */
async function onFilePick(e){
  const file=e.target.files[0]; if(!file) return;
  const url = await new Promise(res=>{
    const img=new Image(), rd=new FileReader();
    rd.onload=ev=>{ img.onload=()=>{ const max=1280; let w=img.width,h=img.height;
      if(w>max||h>max){ const r=Math.min(max/w,max/h); w=Math.round(w*r); h=Math.round(h*r); }
      const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h);
      res(c.toDataURL('image/jpeg',0.7)); }; img.src=ev.target.result; };
    rd.readAsDataURL(file);
  });
  e.target.value='';
  if(document.getElementById('pend-toggle').checked){ uploadBg(url); toast('已存入待處理 ✅'); }
  else { shotUrl=url; openClassify(); }
}

/* 離開頁面時關閉相機 */
window.addEventListener('pagehide', ()=>{ if(stream) stream.getTracks().forEach(t=>t.stop()); });
startCamera();
</script>
{% endblock %}
