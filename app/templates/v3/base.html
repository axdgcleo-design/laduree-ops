<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Ladurée 財務{% endblock %}</title>
<style>
:root{
  --cream:#f4f1ec; --ink:#1a1a1a; --mid:#6b6560; --muted:#a09890; --line:#e3ded6;
  --red:#c44536; --red-bg:#fdf0ee; --green:#2d6a4f; --green-bg:#edf7f1;
  --amber:#8a6000; --amber-bg:#fdf6e3; --blue:#1d4ed8; --blue-bg:#e8f0ff; --white:#fff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC','PingFang TC',sans-serif;background:var(--cream);color:var(--ink);font-size:14px;line-height:1.5}
.mono{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
a{color:inherit;text-decoration:none}
/* Layout */
.wrap{display:flex;min-height:100vh}
.side{width:186px;background:var(--ink);color:var(--cream);flex:0 0 186px;position:sticky;top:0;height:100vh;padding:20px 0;display:flex;flex-direction:column}
.brand{font-family:'Cormorant Garamond',serif;font-size:22px;letter-spacing:.06em;padding:0 22px 4px}
.brand small{display:block;font-family:sans-serif;font-size:10px;letter-spacing:.28em;color:var(--muted);margin-top:2px}
.nav{margin-top:22px;display:flex;flex-direction:column;gap:1px}
.nav a{padding:11px 22px;font-size:13px;color:#cfc9c0;border-left:3px solid transparent}
.nav a:hover{background:rgba(255,255,255,.05);color:#fff}
.nav a.on{background:rgba(255,255,255,.08);color:#fff;border-left-color:var(--cream);font-weight:600}
.main{flex:1;padding:28px 34px;max-width:1400px;overflow-x:auto}
.h1{font-size:21px;font-weight:700;margin-bottom:2px}
.sub{color:var(--mid);font-size:12px;margin-bottom:22px}
.head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:20px}
/* KPI */
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:22px}
.kpi{background:var(--white);border:1px solid var(--line);border-radius:8px;padding:14px 15px}
.kpi .l{font-size:11px;color:var(--mid);letter-spacing:.04em;margin-bottom:7px}
.kpi .v{font-size:19px;font-weight:700}
.kpi .s{font-size:11px;color:var(--muted);margin-top:3px}
.g{color:var(--green)} .r{color:var(--red)} .a{color:var(--amber)} .b{color:var(--blue)}
/* Card */
.card{background:var(--white);border:1px solid var(--line);border-radius:8px;padding:16px 18px;margin-bottom:16px}
.card h3{font-size:13px;font-weight:700;margin-bottom:14px;letter-spacing:.03em}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
/* Table */
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:9px 10px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
th{font-size:11px;color:var(--mid);font-weight:600;letter-spacing:.04em;text-transform:none;background:#faf8f5;position:sticky;top:0}
td.r,th.r{text-align:right}
tbody tr:hover{background:#faf8f5}
tfoot td{font-weight:700;border-top:2px solid var(--line);border-bottom:none}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;background:var(--cream);color:var(--mid)}
.tag.gr{background:var(--green-bg);color:var(--green)}
.tag.rd{background:var(--red-bg);color:var(--red)}
.tag.am{background:var(--amber-bg);color:var(--amber)}
.tag.bl{background:var(--blue-bg);color:var(--blue)}
.grp{background:var(--ink);color:var(--cream)}
.grp td{color:var(--cream);font-weight:700;border-bottom:none}
/* Filter bar */
.filters{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px}
.filters select,.filters input{font-family:inherit;font-size:13px;padding:7px 9px;border:1px solid var(--line);border-radius:6px;background:var(--white);color:var(--ink)}
.filters .seg{display:inline-flex;border:1px solid var(--line);border-radius:6px;overflow:hidden}
.filters .seg a{padding:7px 12px;font-size:12px;background:var(--white)}
.filters .seg a.on{background:var(--ink);color:var(--cream)}
.btn{padding:7px 13px;border:1px solid var(--line);border-radius:6px;background:var(--white);font-size:12px;cursor:pointer}
.btn.p{background:var(--ink);color:var(--cream);border-color:var(--ink)}
/* Bars */
.bar-row{display:grid;grid-template-columns:120px 1fr 96px;gap:10px;align-items:center;margin-bottom:9px;font-size:13px}
.bar-track{background:var(--cream);border-radius:5px;height:22px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:5px;background:var(--ink)}
.bar-fill.gr{background:var(--green)} .bar-fill.rd{background:var(--red)} .bar-fill.am{background:var(--amber)} .bar-fill.bl{background:var(--blue)}
/* Column chart */
.cols{display:flex;align-items:flex-end;gap:6px;height:150px;padding-top:10px}
.col{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:3px;height:100%}
.col .stack{width:70%;display:flex;flex-direction:column-reverse;height:100%;justify-content:flex-start}
.col .seg2{width:100%}
.col small{font-size:10px;color:var(--muted)}
.legend{display:flex;gap:14px;font-size:11px;color:var(--mid);margin-top:8px}
.legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle}
.empty{padding:40px;text-align:center;color:var(--muted)}
@media(max-width:900px){.kpis{grid-template-columns:repeat(3,1fr)}.grid2{grid-template-columns:1fr}.side{display:none}}
</style>
</head>
<body>
<div class="wrap">
  <aside class="side">
    <div class="brand">LA DURÉE<small>漣一設計 · 財務</small></div>
    <nav class="nav">
      <a href="/v3"          class="{{ 'on' if active=='dashboard' }}">總覽 Dashboard</a>
      <a href="/v3/projects" class="{{ 'on' if active=='projects' }}">專案</a>
      <a href="/v3/income"   class="{{ 'on' if active=='income' }}">收入</a>
      <a href="/v3/expenses" class="{{ 'on' if active=='expenses' }}">支出</a>
      <a href="/v3/vendors"  class="{{ 'on' if active=='vendors' }}">廠商</a>
      <a href="/v3/analysis" class="{{ 'on' if active=='analysis' }}">分析</a>
    </nav>
    <div style="margin-top:auto;padding:0 22px;font-size:10px;color:var(--muted)">v3 · Database-First</div>
  </aside>
  <main class="main">
    {% block body %}{% endblock %}
  </main>
</div>
</body>
</html>
